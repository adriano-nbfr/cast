<ds-crud-consulta [colunas]="colunas"
  [acoesDatatable]="acoesDatatable"
  [tamanhoPaginaInicial]="5"
  [ordenacaoInicial]="{coluna: 'categoria.nome', sentido: 'asc'}"
  [permitirExclusaoEmLote]="true"
  [exclusaoEmLoteSequencial]="false">

  <form dsForm [bloquearSugestoes]="true">
    <ds-form-control gridClass="col-md-12 col-lg-4">
      <select dsFormControl ngModel name="idCategoria" label="Categoria">
        <option [ngValue]="null"></option>

        @for (categoria of listagemCategorias(); track categoria.id) {
          <option [ngValue]="categoria.id">{{categoria.nome}}</option>
        }
      </select>
    </ds-form-control>

    <ds-form-control gridClass="col-md-10 col-lg-4">
      <input dsFormControl type="text" ngModel name="nome" label="Nome" />
    </ds-form-control>

    <ds-form-control gridClass="col-md-2">
      <select dsFormControl ngModel name="ativo" label="Ativo">
        <option [ngValue]="null"></option>
        <option [ngValue]="true">Sim</option>
        <option [ngValue]="false">Não</option>
      </select>
    </ds-form-control>
  </form>

  <ng-container dsDatatableColuna="ativoSwitch" atributo="ativo" titulo="Ativo" largura="80" [ordenavel]="true">
    <ng-template dsColunaCelula let-servico="dadoLinha">
      <input type="checkbox" aria-label="Ativo" dsFormSwitch
        [id]="`switchAtivo-${servico.id}`" [checked]="servico.ativo"
        (click)="inverterStatusServico(servico, $event)">
    </ng-template>
  </ng-container>

</ds-crud-consulta>
